<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../favicon/favicon.ico">
    <title>Tabela de Prazo Curto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: #333;
            font-size: 13px;
            margin: 5px;
            background-color: #e8e8e8;
        }

        .top-bar {
            background-color: white;
            padding: 8px 15px;
            border-bottom: 1px solid #ccc;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-bar-left {
            color: #3d7399;
            font-size: 13px;
            font-weight: bold;
        }

        .top-bar-right {
            color: #666;
            font-size: 11px;
        }

        .main-content {
            background-color: white;
            margin: 0;
            padding: 10px;
        }

        .tabs-ramos {
            display: flex;
            gap: 5px;
            margin: 10px 20px 0 20px;
        }
        
        .tab-ramo {
            padding: 6px 14px;
            font-size: 12px;
            border: 1px solid #ccc;
            background-color: #f5f5f5;
            cursor: pointer;
            font-weight: bold;
            color: #555;
            transition: all 0.2s ease;
        }
        
        .tab-ramo.active {
            background-color: #4a6675;
            color: white;
            border-color: #3d5560;
        }
        
        .tab-ramo:hover {
            background-color: #e6e6e6;
        }

        .form-section {
            margin: 20px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.12);
        }

        .form-section.fechado .form-content {
            display: none;
        }

        .header-section {
            background-color: #4a6675;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #3d5560;
            cursor: pointer;
            user-select: none;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: bold;
        }

        .header-icon {
            transition: transform 0.2s ease;
            font-size: 13px;
        }

        .form-section.fechado .header-icon {
            transform: rotate(-90deg);
        }

        .form-content {
            background-color: white;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin: 20px;
        }

        .form-group label {
            font-size: 12px;
            color: #333;
            margin-bottom: 4px;
            font-weight: bold;
        }

        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="date"] {
            padding: 6px 8px;
            border: 1px solid #ccc;
            background-color: white;
            font-size: 12px;
            font-family: Arial, sans-serif;
        }

        .form-group input:focus {
            outline: none;
            border-color: #66afe9;
            box-shadow: 0 0 3px rgba(102, 175, 233, 0.5);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 0;
        }

        .action-buttons {
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            gap: 10px;
            padding: 15px 20px;
            border-top: 1px solid #ddd;
            margin-top: 20px;
        }

        .btn {
            padding: 7px 20px;
            border: 1px solid #ccc;
            background-color: white;
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: bold;
        }

        .btn:hover:not(:disabled) {
            background-color: #f5f5f5;
        }

        .btn-processar {
            background-color: #5bc0de;
            color: white;
            border-color: #5bc0de;
        }

        .btn-processar:hover:not(:disabled) {
            background-color: #46b8da;
        }

        .btn-limpar {
            background-color: #d9534f;
            color: white;
            border-color: #d9534f;
        }

        .btn-limpar:hover {
            background-color: #c9302c;
        }

        .btn-tabela {
            background-color: #f0ad4e;
            color: white;
            border-color: #f0ad4e;
        }

        .btn-tabela:hover {
            background-color: #ec971f;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .results {
            background-color: #fafafa;
            border: 1px solid #ddd;
            margin: 20px;
            padding: 0;
            display: none;
        }

        .results.show {
            display: block;
        }

        .result-header {
            background-color: #4a6675;
            color: white;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: bold;
        }

        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 0;
        }

        .result-item {
            padding: 15px;
            border-right: 1px solid #ddd;
            border-bottom: 1px solid #ddd;
        }

        .result-item:last-child {
            border-right: none;
        }

        .result-item label {
            font-weight: bold;
            color: #666;
            font-size: 11px;
            display: block;
            margin-bottom: 5px;
        }

        .result-item .value {
            font-size: 16px;
            font-weight: bold;
            color: #333;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal.show {
            display: block;
        }

        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 0;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            background-color: #4a6675;
            color: white;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
        }

        .close {
            color: white;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0;
            line-height: 1;
        }

        .close:hover {
            color: #ccc;
        }

        .modal-body {
            padding: 15px;
            overflow-y: auto;
            max-height: calc(80vh - 60px);
        }

        .reference-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px;
        }

        .reference-table th,
        .reference-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }

        .reference-table th {
            background-color: #4a6675;
            color: white;
            font-weight: bold;
        }

        .reference-table tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        .reference-table tr:hover {
            background-color: #f0f8ff;
        }

        .alert {
            padding: 10px 12px;
            margin: 15px 20px;
            border-left: 4px solid;
            font-size: 12px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert.error {
            background-color: #f2dede;
            border-color: #d9534f;
            color: #a94442;
        }

        @media (max-width: 1024px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .result-grid {
                grid-template-columns: 1fr;
            }

            .result-item {
                border-right: none;
            }

            .tabs-ramos {
                flex-wrap: wrap;
            }

            .action-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                justify-content: center;
            }
        }

                    </div>
                    <div class="form-group">

                    Consulta por Período
                </div>
            </div>
            <div class="form-content">
                <div class="form-row">
                    <div class="form-group">

            </div>
        </div>

            <div class="header-section" onclick="toggleSection('method3')">
                <div class="header-title">

                    Cálculo Pro Rata
                </div>
            </div>
            <div class="form-content">
                <div class="form-row">
                    <div class="form-group">
                        <label for="premioLiquido2">Prêmio Líquido (R$)</label>
                        <input type="number" id="premioLiquido2" step="0.01" placeholder="0,00">

                    <div class="form-group">

    <script>
        function selectMethod(method) {
            const sections = ['method1', 'method2', 'method3', 'method4', 'method5'];
            const buttons = document.querySelectorAll('.tab-ramo');
            
            sections.forEach(section => {
                document.getElementById(section).style.display = 'none';
            });
            
            buttons.forEach(btn => btn.classList.remove('active'));
            
            document.getElementById('method' + method).style.display = 'block';
            buttons[method - 1].classList.add('active');
            
            hideResults();
            hideAlert();
        }

        function toggleSection(sectionId) {
            const section = document.getElementById(sectionId);
            section.classList.toggle('fechado');
        }

        function showAlert(message, type = 'error') {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert show ' + type;
            setTimeout(() => {
                hideAlert();
            }, 5000);
        }

        function hideAlert() {
            const alert = document.getElementById('alert');
            alert.classList.remove('show');
        }

        function showResults() {
            document.getElementById('results').classList.add('show');
        }

        function hideResults() {
            document.getElementById('results').classList.remove('show');
        }

        function limparFormulario(method) {
            if (method === 1) {
                document.getElementById('premioLiquido1').value = '';
                document.getElementById('qtdeParcelas1').value = '';
                document.getElementById('parcelasPagas1').value = '';
            } else if (method === 2) {
                document.getElementById('dataInicial').value = '';
                document.getElementById('dataFinal').value = '';
            } else if (method === 3) {
                document.getElementById('premioLiquido2').value = '';
                document.getElementById('dataInicial2').value = '';
                document.getElementById('dataFinal2').value = '';
            } else if (method === 4) {
                document.getElementById('dataInicial3').value = '';
                document.getElementById('dataFinal3').value = '';
            } else if (method === 5) {
                document.getElementById('premioTotal').value = '';
                document.getElementById('porcIof').value = '';
            }
            hideResults();
            hideAlert();
        }

        function calculateMethod1() {
            const premioLiquido = parseFloat(document.getElementById('premioLiquido1').value);
            const qtdeParcelas = parseInt(document.getElementById('qtdeParcelas1').value);
            const parcelasPagas = parseInt(document.getElementById('parcelasPagas1').value);

            if (!premioLiquido || !qtdeParcelas || parcelasPagas === null || parcelasPagas === undefined) {
                showAlert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (parcelasPagas > qtdeParcelas) {
                showAlert('O número de parcelas pagas não pode ser maior que o total de parcelas.');
                return;
            }

            const percentualTabelaPrazoCurto = (parcelasPagas / qtdeParcelas) * 100;
            const premioDevido = premioLiquido * (percentualTabelaPrazoCurto / 100);
            const premioCancelado = premioLiquido - premioDevido;

            displayResults(premioLiquido, premioDevido, premioCancelado, percentualTabelaPrazoCurto);
            document.getElementById('diasCorridosResult').style.display = 'none';
        }

        function calculateMethod2() {
            const dataInicial = new Date(document.getElementById('dataInicial').value);
            const dataFinal = new Date(document.getElementById('dataFinal').value);

            if (!dataInicial || !dataFinal) {
                showAlert('Por favor, preencha as datas inicial e final.');
                return;
            }

            if (dataFinal <= dataInicial) {
                showAlert('A data final deve ser posterior à data inicial.');
                return;
            }

            const diasCorridos = Math.ceil((dataFinal - dataInicial) / (1000 * 60 * 60 * 24));
            const percentualTabelaPrazoCurto = getPercentualByDias(diasCorridos);

            displayMethod2Results(diasCorridos, percentualTabelaPrazoCurto);
        }
        
        function calculateMethod3() {
            const premioLiquido = parseFloat(document.getElementById('premioLiquido2').value);
            const dataInicial = new Date(document.getElementById('dataInicial2').value);
            const dataFinal = new Date(document.getElementById('dataFinal2').value);

            if (!premioLiquido || !dataInicial || !dataFinal) {
                showAlert('Por favor, preencha todos os campos obrigatórios.');
                return;
            }

            if (dataFinal <= dataInicial) {
                showAlert('A data final deve ser posterior à data inicial.');
                return;
            }

            const diasCorridos = Math.ceil((dataFinal - dataInicial) / (1000 * 60 * 60 * 24));
            const percentualTabelaPrazoCurto = premioLiquido / 365;
            const premioDevido = diasCorridos * percentualTabelaPrazoCurto;

            displayMethod3Results(diasCorridos, premioDevido);
        }

        function calculateMethod4() {
            const data1 = new Date(document.getElementById("dataInicial3").value);
            const data2 = new Date(document.getElementById("dataFinal3").value);

            if (!data1 || !data2) {
                showAlert("Por favor, selecione ambas as datas.");
                return;
            }

            let diffTime = Math.abs(data2 - data1);
            let diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            let anos = Math.floor(diffDays / 365);
            let meses = Math.floor((diffDays % 365) / 30);
            let dias = diffDays - anos * 365 - meses * 30;

            displayMethod4Results(`${anos} anos, ${meses} meses e ${dias} dias (${diffDays} dias no total)`);
        }
        
        function calculateMethod5(){
            let valor_iof = document.getElementById("porcIof").value;
            let valor_premio_total = document.getElementById('premioTotal').value;
            
            if (!valor_iof){
                valor_iof = 0;
            }
            if (!valor_premio_total){
                valor_premio_total = 0;
            }
            
            let total = valor_premio_total / (1 + (valor_iof / 100));
            
            displayMethod5Results(total);
        }

        function getPercentualByDias(dias) {
            for (let i = 0; i < tabelaReferencia.length; i++) {
                if (dias <= tabelaReferencia[i].dias) {
                    return tabelaReferencia[i].percentual;
                }
            }
            return 100;
        }
        
        function displayMethod3Results(diasCorridos, percentual) {
            document.getElementById('resultPremioLiquido').parentElement.style.display = 'none';
            document.getElementById('resultPercentual').parentElement.style.display = 'none';
            document.getElementById('resultPremioCancelado').parentElement.style.display = 'none';
            
            document.getElementById('resultPremioDevido').textContent = formatCurrency(percentual.toFixed(2));
            document.getElementById('diasCorridosResult').style.display = 'block';
            document.getElementById('resultDiasCorridos').textContent = diasCorridos + ' dias';
            
            showResults();
        }

        function displayMethod2Results(diasCorridos, percentual) {
            document.getElementById('resultPremioLiquido').parentElement.style.display = 'none';
            document.getElementById('resultPremioDevido').parentElement.style.display = 'none';
            document.getElementById('resultPremioCancelado').parentElement.style.display = 'none';
            
            document.getElementById('resultPercentual').textContent = percentual.toFixed(2) + '%';
            document.getElementById('diasCorridosResult').style.display = 'block';
            document.getElementById('resultDiasCorridos').textContent = diasCorridos + ' dias';
            
            showResults();
        }
        
        function displayMethod4Results(diasCorridos) {
            document.getElementById('resultPremioLiquido').parentElement.style.display = 'none';
            document.getElementById('resultPremioDevido').parentElement.style.display = 'none';
            document.getElementById('resultPremioCancelado').parentElement.style.display = 'none';
            document.getElementById('resultPercentual').parentElement.style.display = 'none';
            
            document.getElementById('diasCorridosResult').style.display = 'block';
            document.getElementById('resultDiasCorridos').textContent = diasCorridos;
            
            showResults();
        }
        
        function displayMethod5Results(premioLiquido) {
            document.getElementById('resultPremioDevido').parentElement.style.display = 'none';
            document.getElementById('resultPremioCancelado').parentElement.style.display = 'none';
            document.getElementById('resultPercentual').parentElement.style.display = 'none';
            document.getElementById('diasCorridosResult').style.display = 'none';
            
            document.getElementById('resultPremioLiquido').parentElement.style.display = 'block';
            document.getElementById('resultPremioLiquido').textContent = formatCurrency(premioLiquido);
            
            showResults();
        }

        function displayResults(premioLiquido, premioDevido, premioCancelado, percentual) {
            document.getElementById('resultPremioLiquido').parentElement.style.display = 'block';
            document.getElementById('resultPremioDevido').parentElement.style.display = 'block';
            document.getElementById('resultPremioCancelado').parentElement.style.display = 'block';
            document.getElementById('resultPercentual').parentElement.style.display = 'block';
            
            document.getElementById('resultPremioLiquido').textContent = formatCurrency(premioLiquido);
            document.getElementById('resultPremioDevido').textContent = formatCurrency(premioDevido);
            document.getElementById('resultPremioCancelado').textContent = formatCurrency(premioCancelado);
            document.getElementById('resultPercentual').textContent = percentual.toFixed(2) + '%';
            
            document.getElementById('diasCorridosResult').style.display = 'none';
            
            showResults();
        }

        function formatCurrency(value) {
            return new Intl.NumberFormat('pt-BR', {
                style: 'currency',
                currency: 'BRL'
            }).format(value);
        }

        function showTable() {
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            tabelaReferencia.forEach(item => {
                const row = tableBody.insertRow();
                const cellPercentual = row.insertCell(0);
                const cellDias = row.insertCell(1);

                let percentual = parseFloat(item.percentual).toFixed(2);

                if (percentual < 10) {
                    percentual = "0" + percentual;
                }

                cellPercentual.textContent = percentual + "%";
                cellDias.textContent = item.dias + ' dias';
            });
            
            document.getElementById('tableModal').classList.add('show');
        }

        function closeTable() {
            document.getElementById('tableModal').classList.remove('show');
        }

        window.onclick = function(event) {
            const modal = document.getElementById('tableModal');
            if (event.target == modal) {
                closeTable();
            }
        }
    </script>
</body>
</html>
