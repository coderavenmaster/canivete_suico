<style>
  .menu-wrap { padding: 0; font-family: Arial, sans-serif; }
  .top-bar { background: white; padding: 8px 15px; border-bottom: 1px solid #ccc; display: flex; justify-content: space-between; align-items: center; }

  .menu-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .menu-card { background: white; border: 1px solid #ccc; cursor: pointer; transition: all 0.15s ease; text-decoration: none; display: flex; flex-direction: column; overflow: hidden; }

  .card-accent { height: 4px; }
  .card-body { padding: 14px 14px 12px; flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .card-icon { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; }
  .card-icon svg { width: 22px; height: 22px; }
  .card-title { font-size: 13px; font-weight: bold; color: #333; }
  .card-desc { font-size: 11px; color: #777; line-height: 1.4; }
  .card-footer { padding: 8px 14px; border-top: 1px solid #eee; display: flex; align-items: center; justify-content: space-between; }
  .card-footer-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 0.5px; }
  .card-arrow { color: #4a6675; font-size: 14px; font-weight: bold; }
  .section-divider { margin: 20px 0 10px; font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; letter-spacing: 1px; border-bottom: 1px solid #ccc; padding-bottom: 6px; }
  @media (max-width: 600px) { .menu-grid { grid-template-columns: 1fr 1fr; } }
